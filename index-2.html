<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vynex Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F0F23; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const initialProjects = [
      { id: 1, name: "Website Redesign", client: "TechCorp Pvt Ltd", progress: 17, activeTasks: 1, members: 6, status: "In Progress", priority: "High", deadline: "Apr 30, 2026", color: "#00C896" },
      { id: 2, name: "SEO Campaign", client: "RetailBrand", progress: 55, activeTasks: 4, members: 3, status: "In Progress", priority: "Medium", deadline: "May 15, 2026", color: "#6C63FF" },
      { id: 3, name: "Social Media Kit", client: "Ironman Gym", progress: 80, activeTasks: 2, members: 2, status: "Review", priority: "Low", deadline: "Apr 10, 2026", color: "#FF6B6B" },
      { id: 4, name: "Brand Identity", client: "StartupX", progress: 100, activeTasks: 0, members: 4, status: "Completed", priority: "High", deadline: "Mar 20, 2026", color: "#FFA94D" },
    ];

    const statusColors = {
      "In Progress": { bg: "#E8F9F4", text: "#00C896" },
      "Review": { bg: "#EEF0FF", text: "#6C63FF" },
      "Completed": { bg: "#FFF4E6", text: "#FFA94D" },
      "Pending": { bg: "#FFF0F0", text: "#FF6B6B" },
    };

    const priorityColors = {
      "High": { bg: "#FFF0F0", text: "#FF6B6B" },
      "Medium": { bg: "#FFF9E6", text: "#E8A020" },
      "Low": { bg: "#F0FFF4", text: "#38A169" },
    };

    function CircularProgress({ percent, color, size = 72 }) {
      const r = (size - 12) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (percent / 100) * circ;
      return (
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2A2A4A" strokeWidth={8} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            transform={`rotate(-90 ${size/2} ${size/2})`}
            style={{ transition: "stroke-dashoffset 0.6s ease" }} />
          <text x="50%" y="50%" textAnchor="middle" dominantBaseline="middle"
            fontSize="12" fontWeight="700" fill="#fff" fontFamily="DM Sans, sans-serif">
            {percent}%
          </text>
        </svg>
      );
    }

    function Dashboard() {
      const [filterStatus, setFilterStatus] = useState("All");
      const [filterPriority, setFilterPriority] = useState("All");
      const [selected, setSelected] = useState(null);
      const [projects, setProjects] = useState(initialProjects);
      const [showAdd, setShowAdd] = useState(false);
      const [newProject, setNewProject] = useState({ name: "", client: "", priority: "Medium", deadline: "", members: 1 });

      const statuses = ["All", "In Progress", "Review", "Completed"];
      const priorities = ["All", "High", "Medium", "Low"];

      const filtered = projects.filter(p =>
        (filterStatus === "All" || p.status === filterStatus) &&
        (filterPriority === "All" || p.priority === filterPriority)
      );

      const totalProjects = projects.length;
      const completedProjects = projects.filter(p => p.status === "Completed").length;
      const avgProgress = Math.round(projects.reduce((a, b) => a + b.progress, 0) / projects.length);
      const totalTasks = projects.reduce((a, b) => a + b.activeTasks, 0);

      const handleAdd = () => {
        if (!newProject.name || !newProject.client) return;
        const colors = ["#00C896", "#6C63FF", "#FF6B6B", "#FFA94D", "#38BDF8"];
        setProjects([...projects, {
          id: Date.now(), ...newProject,
          progress: 0, activeTasks: 0, status: "In Progress",
          color: colors[projects.length % colors.length],
          members: Number(newProject.members),
        }]);
        setShowAdd(false);
        setNewProject({ name: "", client: "", priority: "Medium", deadline: "", members: 1 });
      };

      const s = (obj) => obj; // passthrough for inline styles

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0F0F23 0%, #1A1A3E 50%, #0F0F23 100%)", fontFamily: "'DM Sans', sans-serif" }}>

          {/* Header */}
          <div style={{ background: "rgba(255,255,255,0.04)", backdropFilter: "blur(20px)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "18px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
            <div>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 17, color: "#00C896", fontWeight: 700, letterSpacing: 1 }}>
                VYNEX<span style={{ color: "#fff" }}>SOLUTION</span>
              </div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>Project Dashboard</div>
            </div>
            <button onClick={() => setShowAdd(true)} style={{ background: "linear-gradient(135deg, #00C896, #00A87C)", border: "none", borderRadius: 10, padding: "10px 16px", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer", boxShadow: "0 4px 16px rgba(0,200,150,0.3)", fontFamily: "'DM Sans', sans-serif" }}>
              + New Project
            </button>
          </div>

          <div style={{ padding: "20px 16px" }}>

            {/* Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
              {[
                { label: "Total Projects", value: totalProjects, icon: "📁", color: "#6C63FF" },
                { label: "Completed", value: completedProjects, icon: "✅", color: "#00C896" },
                { label: "Avg Progress", value: `${avgProgress}%`, icon: "📊", color: "#FFA94D" },
                { label: "Active Tasks", value: totalTasks, icon: "🎯", color: "#FF6B6B" },
              ].map((stat, i) => (
                <div key={i} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: "16px", display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 42, height: 42, borderRadius: 12, background: `${stat.color}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{stat.icon}</div>
                  <div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: "#fff" }}>{stat.value}</div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", marginTop: 1 }}>{stat.label}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Filters */}
            <div style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
              {statuses.map(st => (
                <button key={st} onClick={() => setFilterStatus(st)} style={{ padding: "7px 14px", borderRadius: 20, border: `1px solid ${filterStatus === st ? "#00C896" : "rgba(255,255,255,0.12)"}`, background: filterStatus === st ? "rgba(0,200,150,0.15)" : "rgba(255,255,255,0.05)", color: filterStatus === st ? "#00C896" : "rgba(255,255,255,0.5)", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "'DM Sans', sans-serif" }}>
                  {st}
                </button>
              ))}
              <div style={{ width: 1, background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />
              {priorities.map(pr => (
                <button key={pr} onClick={() => setFilterPriority(pr)} style={{ padding: "7px 14px", borderRadius: 20, border: `1px solid ${filterPriority === pr ? "#6C63FF" : "rgba(255,255,255,0.12)"}`, background: filterPriority === pr ? "rgba(108,99,255,0.15)" : "rgba(255,255,255,0.05)", color: filterPriority === pr ? "#A29BFE" : "rgba(255,255,255,0.5)", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "'DM Sans', sans-serif" }}>
                  {pr}
                </button>
              ))}
            </div>

            {/* Project Cards */}
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {filtered.map(p => (
                <div key={p.id} onClick={() => setSelected(selected?.id === p.id ? null : p)}
                  style={{ background: "rgba(255,255,255,0.06)", border: `1px solid ${selected?.id === p.id ? p.color + "60" : "rgba(255,255,255,0.08)"}`, borderRadius: 20, padding: "18px", cursor: "pointer", transition: "all 0.25s ease", boxShadow: selected?.id === p.id ? `0 8px 32px ${p.color}20` : "none" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ flex: 1, marginRight: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <div style={{ width: 10, height: 10, borderRadius: "50%", background: p.color, flexShrink: 0 }} />
                        <div style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>{p.name}</div>
                      </div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 10, marginLeft: 18 }}>{p.client}</div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                        <span style={{ padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, background: statusColors[p.status]?.bg || "#eee", color: statusColors[p.status]?.text || "#333" }}>{p.status}</span>
                        <span style={{ padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, background: priorityColors[p.priority]?.bg || "#eee", color: priorityColors[p.priority]?.text || "#333" }}>{p.priority}</span>
                      </div>
                      <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 6, height: 6, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${p.progress}%`, background: `linear-gradient(90deg, ${p.color}, ${p.color}BB)`, borderRadius: 6, transition: "width 0.6s ease" }} />
                      </div>
                      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.35)", marginTop: 4 }}>{p.progress}% complete</div>
                    </div>
                    <CircularProgress percent={p.progress} color={p.color} size={72} />
                  </div>

                  {selected?.id === p.id && (
                    <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid rgba(255,255,255,0.08)", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                      {[
                        { label: "Active Tasks", value: p.activeTasks, icon: "🎯" },
                        { label: "Members", value: p.members, icon: "👥" },
                        { label: "Deadline", value: p.deadline, icon: "📅" },
                      ].map((d, i) => (
                        <div key={i} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "10px", textAlign: "center" }}>
                          <div style={{ fontSize: 16, marginBottom: 4 }}>{d.icon}</div>
                          <div style={{ fontSize: 13, fontWeight: 700, color: "#fff" }}>{d.value}</div>
                          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", marginTop: 2 }}>{d.label}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}

              {filtered.length === 0 && (
                <div style={{ textAlign: "center", padding: "40px 0", color: "rgba(255,255,255,0.3)", fontSize: 14 }}>
                  No projects found.
                </div>
              )}
            </div>
          </div>

          {/* Add Project Modal */}
          {showAdd && (
            <div onClick={() => setShowAdd(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", backdropFilter: "blur(8px)", display: "flex", alignItems: "flex-end", zIndex: 100 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: "#1A1A3E", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "24px 24px 0 0", padding: "24px 20px", width: "100%", maxHeight: "80vh", overflowY: "auto" }}>
                <div style={{ fontSize: 17, fontWeight: 700, color: "#fff", marginBottom: 20 }}>Add New Project</div>

                {[
                  { label: "Project Name", key: "name", type: "text", placeholder: "e.g. Logo Design" },
                  { label: "Client Name", key: "client", type: "text", placeholder: "e.g. Ironman Gym" },
                  { label: "Deadline", key: "deadline", type: "text", placeholder: "e.g. May 30, 2026" },
                  { label: "Team Members", key: "members", type: "number", placeholder: "e.g. 3" },
                ].map(f => (
                  <div key={f.key} style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginBottom: 6 }}>{f.label}</div>
                    <input type={f.type} placeholder={f.placeholder} value={newProject[f.key]}
                      onChange={e => setNewProject({ ...newProject, [f.key]: e.target.value })}
                      style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.06)", color: "#fff", fontSize: 14, fontFamily: "'DM Sans', sans-serif", outline: "none", boxSizing: "border-box" }} />
                  </div>
                ))}

                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginBottom: 6 }}>Priority</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {["High", "Medium", "Low"].map(pr => (
                      <button key={pr} onClick={() => setNewProject({ ...newProject, priority: pr })}
                        style={{ flex: 1, padding: "10px", borderRadius: 10, border: `1px solid ${newProject.priority === pr ? priorityColors[pr].text : "rgba(255,255,255,0.1)"}`, background: newProject.priority === pr ? `${priorityColors[pr].text}20` : "rgba(255,255,255,0.04)", color: newProject.priority === pr ? priorityColors[pr].text : "rgba(255,255,255,0.4)", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>
                        {pr}
                      </button>
                    ))}
                  </div>
                </div>

                <button onClick={handleAdd} style={{ width: "100%", padding: "14px", background: "linear-gradient(135deg, #00C896, #00A87C)", border: "none", borderRadius: 14, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", boxShadow: "0 4px 20px rgba(0,200,150,0.3)" }}>
                  Create Project
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
