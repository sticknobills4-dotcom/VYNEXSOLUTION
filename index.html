<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vynex Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #0F0F23 0%, #1A1A3E 50%, #0F0F23 100%); min-height: 100vh; font-family: 'DM Sans', sans-serif; color: #fff; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .header { background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(20px); }
    .logo { font-family: 'Space Mono', monospace; font-size: 17px; color: #00C896; font-weight: 700; letter-spacing: 1px; }
    .logo span { color: #fff; }
    .logo-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .btn-add { background: linear-gradient(135deg, #00C896, #00A87C); border: none; border-radius: 10px; padding: 10px 16px; color: #fff; font-weight: 700; font-size: 13px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,200,150,0.3); font-family: 'DM Sans', sans-serif; }

    .content { padding: 20px 16px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 12px; }
    .stat-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .stat-value { font-size: 22px; font-weight: 800; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }

    .filters { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .filter-btn.active-status { border-color: #00C896; background: rgba(0,200,150,0.15); color: #00C896; }
    .filter-btn.active-priority { border-color: #6C63FF; background: rgba(108,99,255,0.15); color: #A29BFE; }
    .filter-divider { width: 1px; background: rgba(255,255,255,0.1); margin: 0 2px; flex-shrink: 0; }

    .cards { display: flex; flex-direction: column; gap: 12px; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 18px; cursor: pointer; transition: all 0.25s ease; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-left { flex: 1; margin-right: 12px; }
    .card-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .card-title { font-size: 15px; font-weight: 700; }
    .card-client { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 10px; margin-left: 18px; }
    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .progress-bar-bg { background: rgba(255,255,255,0.1); border-radius: 6px; height: 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
    .progress-text { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 4px; }

    .card-details { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .detail-box { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; text-align: center; }
    .detail-icon { font-size: 16px; margin-bottom: 4px; }
    .detail-value { font-size: 13px; font-weight: 700; }
    .detail-label { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: flex; align-items: flex-end; z-index: 100; }
    .modal-box { background: #1A1A3E; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .field-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
    .field-wrap { margin-bottom: 14px; }
    .field-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; }
    .priority-row { display: flex; gap: 8px; }
    .priority-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .btn-create { width: 100%; padding: 14px; background: linear-gradient(135deg, #00C896, #00A87C); border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 20px rgba(0,200,150,0.3); margin-top: 4px; }
    .empty { text-align: center; padding: 40px 0; color: rgba(255,255,255,0.3); font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">VYNEX<span>SOLUTION</span></div>
    <div class="logo-sub">Project Dashboard</div>
  </div>
  <button class="btn-add" onclick="openModal()">+ New Project</button>
</div>

<div class="content">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="filters" id="filters"></div>
  <div class="cards" id="cards"></div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">Add New Project</div>
    <div class="field-wrap"><div class="field-label">Project Name</div><input class="field-input" id="f-name" placeholder="e.g. Logo Design" /></div>
    <div class="field-wrap"><div class="field-label">Client Name</div><input class="field-input" id="f-client" placeholder="e.g. Ironman Gym" /></div>
    <div class="field-wrap"><div class="field-label">Deadline</div><input class="field-input" id="f-deadline" placeholder="e.g. May 30, 2026" /></div>
    <div class="field-wrap"><div class="field-label">Team Members</div><input class="field-input" id="f-members" type="number" placeholder="e.g. 3" /></div>
    <div class="field-wrap">
      <div class="field-label">Priority</div>
      <div class="priority-row">
        <button class="priority-btn" id="pr-High" onclick="selectPriority('High')">High</button>
        <button class="priority-btn" id="pr-Medium" onclick="selectPriority('Medium')">Medium</button>
        <button class="priority-btn" id="pr-Low" onclick="selectPriority('Low')">Low</button>
      </div>
    </div>
    <button class="btn-create" onclick="addProject()">Create Project</button>
  </div>
</div>

<script>
  const statusColors = {
    "In Progress": { bg:"#E8F9F4", text:"#00C896" },
    "Review":      { bg:"#EEF0FF", text:"#6C63FF" },
    "Completed":   { bg:"#FFF4E6", text:"#FFA94D" },
    "Pending":     { bg:"#FFF0F0", text:"#FF6B6B" },
  };
  const priorityColors = {
    "High":   { bg:"#FFF0F0", text:"#FF6B6B" },
    "Medium": { bg:"#FFF9E6", text:"#E8A020" },
    "Low":    { bg:"#F0FFF4", text:"#38A169" },
  };
  const cardColors = ["#00C896","#6C63FF","#FF6B6B","#FFA94D","#38BDF8"];

  let projects = [
    { id:1, name:"Website Redesign",  client:"TechCorp Pvt Ltd", progress:17,  activeTasks:1, members:6, status:"In Progress", priority:"High",   deadline:"Apr 30, 2026", color:"#00C896" },
    { id:2, name:"SEO Campaign",      client:"RetailBrand",      progress:55,  activeTasks:4, members:3, status:"In Progress", priority:"Medium", deadline:"May 15, 2026", color:"#6C63FF" },
    { id:3, name:"Social Media Kit",  client:"Ironman Gym",      progress:80,  activeTasks:2, members:2, status:"Review",      priority:"Low",    deadline:"Apr 10, 2026", color:"#FF6B6B" },
    { id:4, name:"Brand Identity",    client:"StartupX",         progress:100, activeTasks:0, members:4, status:"Completed",   priority:"High",   deadline:"Mar 20, 2026", color:"#FFA94D" },
  ];

  let filterStatus   = "All";
  let filterPriority = "All";
  let selectedId     = null;
  let newPriority    = "Medium";

  function circularSVG(percent, color, size=72) {
    const r = (size-12)/2, circ = 2*Math.PI*r;
    const offset = circ - (percent/100)*circ;
    return `<svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#2A2A4A" stroke-width="8"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8"
        stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})"/>
      <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-size="12" font-weight="700" fill="#fff" font-family="DM Sans,sans-serif">${percent}%</text>
    </svg>`;
  }

  function renderStats() {
    const total     = projects.length;
    const completed = projects.filter(p=>p.status==="Completed").length;
    const avg       = Math.round(projects.reduce((a,b)=>a+b.progress,0)/projects.length);
    const tasks     = projects.reduce((a,b)=>a+b.activeTasks,0);
    const items = [
      { label:"Total Projects", value:total,    icon:"📁", color:"#6C63FF" },
      { label:"Completed",      value:completed, icon:"✅", color:"#00C896" },
      { label:"Avg Progress",   value:avg+"%",   icon:"📊", color:"#FFA94D" },
      { label:"Active Tasks",   value:tasks,     icon:"🎯", color:"#FF6B6B" },
    ];
    document.getElementById("statsGrid").innerHTML = items.map(s=>`
      <div class="stat-card">
        <div class="stat-icon" style="background:${s.color}20">${s.icon}</div>
        <div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>
      </div>`).join("");
  }

  function renderFilters() {
    const statuses   = ["All","In Progress","Review","Completed"];
    const priorities = ["All","High","Medium","Low"];
    const sBtns = statuses.map(s=>`<button class="filter-btn ${filterStatus===s?'active-status':''}" onclick="setStatus('${s}')">${s}</button>`).join("");
    const pBtns = priorities.map(p=>`<button class="filter-btn ${filterPriority===p?'active-priority':''}" onclick="setPriority('${p}')">${p}</button>`).join("");
    document.getElementById("filters").innerHTML = sBtns + `<div class="filter-divider"></div>` + pBtns;
  }

  function renderCards() {
    const filtered = projects.filter(p=>
      (filterStatus==="All"   || p.status===filterStatus) &&
      (filterPriority==="All" || p.priority===filterPriority)
    );
    if (!filtered.length) {
      document.getElementById("cards").innerHTML = `<div class="empty">No projects found.</div>`;
      return;
    }
    document.getElementById("cards").innerHTML = filtered.map(p=>{
      const sc = statusColors[p.status]    || { bg:"#eee", text:"#333" };
      const pc = priorityColors[p.priority] || { bg:"#eee", text:"#333" };
      const isSel = selectedId===p.id;
      const details = isSel ? `
        <div class="card-details">
          <div class="detail-box"><div class="detail-icon">🎯</div><div class="detail-value">${p.activeTasks}</div><div class="detail-label">Active Tasks</div></div>
          <div class="detail-box"><div class="detail-icon">👥</div><div class="detail-value">${p.members}</div><div class="detail-label">Members</div></div>
          <div class="detail-box"><div class="detail-icon">📅</div><div class="detail-value">${p.deadline}</div><div class="detail-label">Deadline</div></div>
        </div>` : "";
      return `
        <div class="card" onclick="toggleCard(${p.id})"
          style="border-color:${isSel?p.color+'60':'rgba(255,255,255,0.08)'}; box-shadow:${isSel?`0 8px 32px ${p.color}20`:'none'}">
          <div class="card-top">
            <div class="card-left">
              <div class="card-title-row">
                <div class="card-dot" style="background:${p.color}"></div>
                <div class="card-title">${p.name}</div>
              </div>
              <div class="card-client">${p.client}</div>
              <div class="card-badges">
                <span class="badge" style="background:${sc.bg};color:${sc.text}">${p.status}</span>
                <span class="badge" style="background:${pc.bg};color:${pc.text}">${p.priority}</span>
              </div>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill" style="width:${p.progress}%;background:linear-gradient(90deg,${p.color},${p.color}BB)"></div>
              </div>
              <div class="progress-text">${p.progress}% complete</div>
            </div>
            ${circularSVG(p.progress, p.color)}
          </div>
          ${details}
        </div>`;
    }).join("");
  }

  function render() { renderStats(); renderFilters(); renderCards(); }
  function setStatus(s)   { filterStatus=s;   render(); }
  function setPriority(p) { filterPriority=p; render(); }
  function toggleCard(id) { selectedId = selectedId===id ? null : id; renderCards(); }
  function openModal()  { document.getElementById("modal").style.display="flex"; selectPriority("Medium"); }
  function closeModal(e){ if(e.target===document.getElementById("modal")) document.getElementById("modal").style.display="none"; }

  function selectPriority(p) {
    newPriority = p;
    ["High","Medium","Low"].forEach(x=>{
      const btn = document.getElementById("pr-"+x);
      const pc  = priorityColors[x];
      if(x===p) { btn.style.borderColor=pc.text; btn.style.background=pc.text+"20"; btn.style.color=pc.text; }
      else       { btn.style.borderColor="rgba(255,255,255,0.1)"; btn.style.background="rgba(255,255,255,0.04)"; btn.style.color="rgba(255,255,255,0.4)"; }
    });
  }

  function addProject() {
    const name     = document.getElementById("f-name").value.trim();
    const client   = document.getElementById("f-client").value.trim();
    const deadline = document.getElementById("f-deadline").value.trim();
    const members  = parseInt(document.getElementById("f-members").value)||1;
    if (!name || !client) return;
    projects.push({ id:Date.now(), name, client, deadline, members, progress:0, activeTasks:0, status:"In Progress", priority:newPriority, color:cardColors[projects.length % cardColors.length] });
    document.getElementById("modal").style.display="none";
    ["f-name","f-client","f-deadline","f-members"].forEach(id=>document.getElementById(id).value="");
    render();
  }

  render();
</script>
</body>
</html>
